<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Neon Sky Runner - WebGL 3D Game</title>
<style>
  body { margin: 0; overflow: hidden; background: #000; font-family: system-ui, sans-serif; color: #fff; overscroll-behavior: none; }
  canvas { touch-action: none; -webkit-user-select: none; user-select: none; }
  #hud {
    position: fixed; top: 12px; left: 12px; z-index: 10;
    font-size: 20px; text-shadow: 0 0 8px #0ff, 0 0 2px #fff;
    letter-spacing: 1px;
  }
  #msg {
    position: fixed; top: 40%; left: 0; right: 0; text-align: center;
    font-size: 42px; z-index: 10; text-shadow: 0 0 12px #f0f, 0 0 4px #fff;
    pointer-events: none;
  }
  #sub { font-size: 18px; margin-top: 12px; color: #9ff; }
</style>
</head>
<body>
<div id="hud">SCORE: <span id="score">0</span> &nbsp;|&nbsp; SPEED: <span id="spd">0</span> &nbsp;|&nbsp; LIFE: <span id="life">3</span></div>
<div id="msg">NEON SKY RUNNER<div id="sub">← → or A/D : move &nbsp; SPACE : jump &nbsp; [click to start]</div></div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.171.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x0a0020, 20, 140);

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 500);
camera.position.set(0, 4, 8);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// ---- Simple SFX (WebAudio, no assets) ----
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function sfx({ freq = 440, freq2 = null, type = 'sine', dur = 0.15, vol = 0.15 }) {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  if (freq2 !== null) osc.frequency.exponentialRampToValueAtTime(Math.max(1, freq2), t0 + dur);
  gain.gain.setValueAtTime(vol, t0);
  gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t0); osc.stop(t0 + dur);
}
const sfxJump = () => sfx({ freq: 300, freq2: 700, type: 'sine', dur: 0.18, vol: 0.12 });
const sfxCoin = () => { sfx({ freq: 880, freq2: 1320, type: 'square', dur: 0.08, vol: 0.08 }); setTimeout(() => sfx({ freq: 1320, type: 'square', dur: 0.12, vol: 0.08 }), 60); };
const sfxHit  = () => sfx({ freq: 220, freq2: 60, type: 'sawtooth', dur: 0.3, vol: 0.2 });

addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// Lights
scene.add(new THREE.AmbientLight(0x8080ff, 0.8));
const dir = new THREE.DirectionalLight(0xffffff, 1.1);
dir.position.set(5, 18, 7);
dir.castShadow = true;
dir.shadow.mapSize.set(1024, 1024);
dir.shadow.camera.left = -15; dir.shadow.camera.right = 15;
dir.shadow.camera.top = 15; dir.shadow.camera.bottom = -15;
dir.shadow.camera.near = 1; dir.shadow.camera.far = 60;
scene.add(dir);
const pinkLight = new THREE.PointLight(0xff00ff, 2, 40);
pinkLight.position.set(0, 6, 0);
scene.add(pinkLight);

// Starfield
const starGeo = new THREE.BufferGeometry();
const starPos = [];
for (let i = 0; i < 1500; i++) {
  starPos.push((Math.random()-0.5)*400, Math.random()*200-20, (Math.random()-0.5)*400);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 })));

// Track (endless tiles)
const TRACK_W = 8;
const TILE_LEN = 20;
const tiles = [];
const tileMat = new THREE.MeshStandardMaterial({ color: 0x1a1a3a, emissive: 0x220044, metalness: 0.3, roughness: 0.4 });
const edgeMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });

function makeTile(z) {
  const g = new THREE.Group();
  const floor = new THREE.Mesh(new THREE.BoxGeometry(TRACK_W, 0.4, TILE_LEN), tileMat);
  floor.receiveShadow = true;
  g.add(floor);
  // glowing edges
  for (const x of [-TRACK_W/2, TRACK_W/2]) {
    const e = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.3, TILE_LEN), edgeMat);
    e.position.set(x, 0.3, 0);
    g.add(e);
  }
  g.position.z = z;
  scene.add(g);
  return g;
}
for (let i = 0; i < 12; i++) tiles.push(makeTile(-i * TILE_LEN));

// Player
const player = new THREE.Group();
const body = new THREE.Mesh(
  new THREE.ConeGeometry(0.6, 1.6, 8),
  new THREE.MeshStandardMaterial({ color: 0x00ffaa, emissive: 0x00aa77, metalness: 0.6 })
);
body.rotation.x = Math.PI / 2;
body.castShadow = true;
player.add(body);
const wing = new THREE.Mesh(
  new THREE.BoxGeometry(2, 0.1, 0.6),
  new THREE.MeshStandardMaterial({ color: 0xff00ff, emissive: 0x770077 })
);
wing.position.y = -0.1;
player.add(wing);
player.position.set(0, 1, 0);
scene.add(player);

// Obstacles & gems
const obstacles = [];
const gems = [];
const obMat = new THREE.MeshStandardMaterial({ color: 0xff2255, emissive: 0x880022, metalness: 0.5 });
const gemMat = new THREE.MeshStandardMaterial({ color: 0xffff00, emissive: 0xaa8800, metalness: 0.8, roughness: 0.1 });

function spawnRow(z) {
  // random pattern: maybe 1-2 obstacles, 1 gem
  const lanes = [-2.4, 0, 2.4];
  const taken = new Set();
  const obCount = Math.random() < 0.7 ? 1 : 2;
  for (let i = 0; i < obCount; i++) {
    let l;
    do { l = Math.floor(Math.random()*3); } while (taken.has(l));
    taken.add(l);
    const type = Math.random() < 0.5 ? 'block' : 'bar';
    if (type === 'block') {
      const m = new THREE.Mesh(new THREE.BoxGeometry(1.6, 1.6, 1.6), obMat);
      m.position.set(lanes[l], 1, z); m.castShadow = true;
      scene.add(m); obstacles.push({ mesh: m, type: 'block' });
    } else {
      // low bar - jump over
      const m = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.4, 0.4), obMat);
      m.position.set(lanes[l], 0.5, z); m.castShadow = true;
      scene.add(m); obstacles.push({ mesh: m, type: 'bar' });
    }
  }
  // gem in a free lane
  const free = [0,1,2].filter(i => !taken.has(i));
  if (free.length) {
    const l = free[Math.floor(Math.random()*free.length)];
    const m = new THREE.Mesh(new THREE.OctahedronGeometry(0.5), gemMat);
    m.position.set(lanes[l], 1.5, z); m.castShadow = true;
    scene.add(m); gems.push(m);
  }
}

// Input
const keys = {};
addEventListener('keydown', e => keys[e.code] = true);
addEventListener('keyup', e => keys[e.code] = false);

// Touch: tap left/right half = lane, swipe up = jump
let touchStartX = 0, touchStartY = 0, touchMoved = false;
const canvasEl = renderer.domElement;
canvasEl.addEventListener('touchstart', e => {
  e.preventDefault();
  initAudio();
  const t = e.changedTouches[0];
  touchStartX = t.clientX; touchStartY = t.clientY; touchMoved = false;
  if (!running) { start(); return; }
}, { passive: false });
canvasEl.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  if (Math.hypot(t.clientX - touchStartX, t.clientY - touchStartY) > 20) touchMoved = true;
}, { passive: false });
canvasEl.addEventListener('touchend', e => {
  e.preventDefault();
  if (!running) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX, dy = t.clientY - touchStartY;
  if (touchMoved && dy < -40 && Math.abs(dy) > Math.abs(dx)) {
    // swipe up = jump
    keys['Space'] = true; setTimeout(() => keys['Space'] = false, 60);
  } else if (!touchMoved) {
    // tap: lane switch (absolute, not toggle — more predictable)
    if (t.clientX < innerWidth / 3) targetX = -2.4;
    else if (t.clientX > innerWidth * 2 / 3) targetX = 2.4;
    else targetX = 0;
  }
}, { passive: false });

// State
let running = false;
let score = 0, life = 3, speed = 0.35;
let targetX = 0;
let vy = 0, jumping = false;
let nextSpawnZ = -30;
const hud = { s: document.getElementById('score'), sp: document.getElementById('spd'), l: document.getElementById('life') };
const msg = document.getElementById('msg');

function start() {
  initAudio();
  running = true;
  msg.style.display = 'none';
  score = 0; life = 3; speed = 0.35;
  player.position.set(0,1,0); targetX = 0; vy = 0; jumping = false;
  obstacles.forEach(o => scene.remove(o.mesh));
  gems.forEach(g => scene.remove(g));
  obstacles.length = 0; gems.length = 0;
  nextSpawnZ = -30;
}
addEventListener('click', () => { initAudio(); if (!running) start(); });
addEventListener('keydown', e => { if (e.code === 'Space' && !running) start(); });

function gameOver() {
  running = false;
  msg.innerHTML = `GAME OVER<div id="sub">Score: ${score} &nbsp; [click to retry]</div>`;
  msg.style.display = 'block';
}

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const t = clock.elapsedTime;

  if (running) {
    // move forward (world moves toward +z relative to player)
    const forward = speed;
    // lane movement
    if (keys['ArrowLeft'] || keys['KeyA']) targetX = -2.4;
    else if (keys['ArrowRight'] || keys['KeyD']) targetX = 2.4;
    else if (keys['KeyS'] || keys['ArrowDown']) targetX = 0;
    // smooth
    player.position.x += (targetX - player.position.x) * 0.2;
    player.rotation.z = (targetX - player.position.x) * 0.3;

    // jump
    if ((keys['Space'] || keys['ArrowUp'] || keys['KeyW']) && !jumping) {
      vy = 0.35; jumping = true; sfxJump();
    }
    if (jumping) {
      player.position.y += vy;
      vy -= 0.018;
      if (player.position.y <= 1) { player.position.y = 1; jumping = false; vy = 0; }
    }

    // scroll: move everything toward +z (camera-relative); we'll move obstacles/tiles
    tiles.forEach(tile => {
      tile.position.z += forward;
      if (tile.position.z > 20) tile.position.z -= tiles.length * TILE_LEN;
    });
    obstacles.forEach(o => o.mesh.position.z += forward);
    gems.forEach(g => { g.position.z += forward; g.rotation.y += dt * 3; g.position.y = 1.5 + Math.sin(t*3 + g.position.x)*0.2; });

    // spawn new rows
    nextSpawnZ += forward;
    if (nextSpawnZ >= 0) {
      spawnRow(-160);
      nextSpawnZ -= 14;
    }

    // collisions
    const px = player.position.x, py = player.position.y, pz = player.position.z;
    for (let i = obstacles.length - 1; i >= 0; i--) {
      const o = obstacles[i];
      const m = o.mesh;
      if (m.position.z > 12) { scene.remove(m); obstacles.splice(i,1); continue; }
      if (Math.abs(m.position.z - pz) < 1 && Math.abs(m.position.x - px) < 1.2) {
        // bar: ok if jumping high
        if (o.type === 'bar' && py > 1.6) continue;
        // hit
        scene.remove(m); obstacles.splice(i,1);
        life--;
        hud.l.textContent = life;
        sfxHit();
        // flash
        body.material.emissive.setHex(0xff0000);
        setTimeout(() => body.material.emissive.setHex(0x00aa77), 150);
        if (life <= 0) gameOver();
      }
    }
    for (let i = gems.length - 1; i >= 0; i--) {
      const g = gems[i];
      if (g.position.z > 12) { scene.remove(g); gems.splice(i,1); continue; }
      if (Math.abs(g.position.z - pz) < 1 && Math.abs(g.position.x - px) < 1 && Math.abs(g.position.y - py) < 1.2) {
        scene.remove(g); gems.splice(i,1);
        score += 10; sfxCoin();
      }
    }

    // distance score
    score += 0.1;
    speed += 0.00015; // gradual speedup
    hud.s.textContent = Math.floor(score);
    hud.sp.textContent = speed.toFixed(2);
  }

  // camera follow
  camera.position.x += (player.position.x * 0.5 - camera.position.x) * 0.1;
  camera.position.y = 4 + Math.max(0, player.position.y - 1) * 0.3;
  camera.lookAt(player.position.x, 1.5, player.position.z - 6);

  // light pulse
  pinkLight.position.x = Math.sin(t)*6;
  pinkLight.intensity = 1.5 + Math.sin(t*4)*0.5;

  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
